<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
</head>
<script>
   function Computerchoice(){
        const random = Math.random();
        if(random<1/3){
            return 'Rock';
        }
        if(random<2/3){
            return 'Paper';
        }
        else{
            return 'Scissor';
        }
   }
   function playerMove(playMove){
       const CompMove = Computerchoice();
       let result = '';
       if(CompMove===playMove){
         result = 'Tie';
       }
       else if((playMove==='Rock'&&CompMove==='Scissor')||(playMove==='Paper'&&CompMove==='Rock')||(playMove==='Scissor'&&CompMove==='paper')){
                  result = 'You win';    
       } 
       else{
        result = 'You lose;'
       }
        alert(`You picked ${playMove}. Computer Picked ${CompMove}.${result}`);
   }
</script>
