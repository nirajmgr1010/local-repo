
<!--
1. BEGINNER: Todo List
Goal: Add, check-off, delete todos
Logic Flow:
Copy code
1. Array: todos = []
2. Add: push new object {id, text, done}
3. Display: LOOP array → create HTML
4. Toggle: LOOP → find id → flip done
5. Delete: FILTER array (keep non-matching ids)
What you'll practice:
Array push/filter
Loop through array
Find object by id
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List2</title>
    <style>
     *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
     }
     body{
        display: flex;
        flex-direction: row;
        width: 100vw;
        height: 100vh;
        justify-content: start;
        align-items:  start;
        font-family: Georgia, 'Times New Roman', Times, serif;
        font-size: 1rem;
        padding: 20px 20px;
     }
     .main{ 
      box-shadow: 4px 4px 10px 0px rgba(0, 0, 0, 0.3);
      border-radius: 8px;
        padding: 50px 50px;
        width: 34%;
     }
     .form-group{
        margin-bottom: 1.2rem;
     }

     label{
        display: inline-block;
     width: 100px;
     }
     input{
        width: 300px;
        padding: 10px 20px;
     }
     #to-heading-css{
        text-align: center;
        margin-bottom: 1rem;
        font-size: 3rem;
     }
     #sub-btn{
      padding: 8px 20px;
     }
     .second-div{
      margin-left: 50px;
      width: 60%;
      height: 100%;
       box-shadow: 4px 4px 10px 0px rgba(0, 0, 0, 0.3);
       border: 1px solid black;
     }

     #sec-div-h2{
      text-align: center;
      margin-top: 15px;
     }
     .todoGrid{
      display: grid;
      grid-template-columns: 50px 200px 200px 200px 200px;
       column-gap: 10px;
        row-gap: 10px;
        align-items: center;
        padding: 10px 20px;
        font-family: 'Times New Roman', Times, serif;
        font-size: 1.2rem;
     }
     .js-todo-list-filter{
      display: grid;
      grid-template-columns: 425px 200px;
      margin-left: 1rem;
      margin-top: 1rem;
      text-align: center;
     }
    </style>
</head>
<body>
    <div class="main">
        <h2 id="to-heading-css">To Do List</h2>
    <div class="form-group">
    <label for="Id">ID: </label>
    <input type="number" id="Id" placeholder="ID" required>
    </div>
      
    <div class="form-group">
    <label for="name">Name: </label>   
    <input type="text" placeholder="Enter your name" id="name"> 
    </div>

    <div class="form-group">
    <label for="Contact">Phone No: </label>
    <input type="number" placeholder="Number" id="Contact" required> 
    </div>
     
    <div class="form-group">
      <label for="Course">Select course</label>
         <select name="" id="Course">
            <option value="" disabled selected>--Course Selection--</option>
            <option value="BIT">BIT</option>
            <option value="BCA">BCA</option>
            <option value="Other">Other</option>
         </select>
    </div>
    <button type="submit" id="sub-btn" onclick="addTodo()">Submit</button>
    </div>

    <div class="second-div">
              <h2 id="sec-div-h2">Student Information</h2>
              <div class="js-todo-list-filter">
               <input type="text" id="search" placeholder="Search by name" onkeyup="renderTodoList()">
               <select  id="filterCourse" onchange="renderTodoList()">
                  <option value="all">All</option>
                  <option value="BIT">BIT</option>
                  <option value="BCA">BCA</option>
                  <option value="Other">Other</option>
               </select>
              </div>
              <div class="js-todo-list todoGrid">

              </div>
    </div>
    <script src="To-do-Script.js"></script>

</body>
</html>
