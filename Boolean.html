    <script>
        //Ternary operator
        const result = 0? 'Truthy' : 'Falsy';
        console.log(result);
        //Guard Operator 
        True && console.log("Hello");
        //It is the replace of this ->
        if(condition){
            console.log("Hello");
        }

        const message = false && 'Hello';
        console.log(message);

        //Default Operator
        const Currency = 'EUR'||'USD'; //TRUE || False
        console.log(Currency);
        const currency = undefined || 'Euro';
        console.log(currency);
    </script>
