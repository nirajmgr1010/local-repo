<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
</head>
<body>
    <div class="game">
        <p>Rock paper Scissors</p>
        <div id="sub-game">
    <button onclick="playerMove('Rock')">Rock</button>
    <button onclick="playerMove('Paper')">Paper</button>
    <button onclick="playerMove('Scissor')">Scissor</button>
     
     <p class="js-result"></p>
     <p class="js-moves"></p>
    <p class="js-score"></p>
    
 
 <button onclick="
      score.wins = 0;
      score.losses = 0;
      score.ties =0;
      updateScoreElement();
      ">Reset Score</button>
</div>
    </div>
    <script>
 const score = {
      wins:0,
      losses:0,
      ties:0
   };
    updateScoreElement();
   function Computerchoice(){
        const random = Math.random();
        if(random<1/3){
            return 'Rock';
        }
        if(random<2/3){
            return 'Paper';
        }
        else{
            return 'Scissor';
        }
   }
   function playerMove(playMove){
       const CompMove = Computerchoice();
       let result = '';
       if(CompMove===playMove){
         result = 'Tie';
       }
       else if((playMove==='Rock'&&CompMove==='Scissor')||(playMove==='Paper'&&CompMove==='Rock')||(playMove==='Scissor'&&CompMove==='Paper')){
                  result = 'You win';    
       } 
       else{
        result = 'You lose'
       }
       if(result =='You win'){
        score.wins += 1;
       }
       else if (result == "You lose"){
        score.losses += 1;
       }
       else{
        score.ties += 1;
       }
         updateScoreElement();


         document.querySelector('.js-result').
         innerHTML = result;

         document.querySelector('.js-moves').
         innerHTML = `Your ${playMove} - ${CompMove} Computer`;

   }
    function updateScoreElement(){
             document.querySelector('.js-score').innerHTML = `Wins: ${score.wins}. Losses: ${score.losses}. Ties: ${score.ties}`;
        }
</script>
</body>
</html>
