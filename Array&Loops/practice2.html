        function countPositive(){
        /*
         Create a function countPositive(nums) that takes an array of numbers
         and returns how many numbers in the array are greater than 0.
         .countPositive([1,-3,5]) => 2
         .countPositive([-2,3,-5,7,10]) => 3
        */
        const arr = [-2,3,-5,7,10,20];
        let count = 0,i=0;
        while(i <= arr.length){
            if(arr[i] > 0){
                count++;
                i++;
            }
            else{
                i++;
            }
        }
        console.log(count);
        }

        function minMax(arr){
         /*
         Create a function minMax(nums) that takes an array of numbers and returns an object with the minimum and maximum numbers in 
         the array(do this using a loop instead of using something like Math.min).
         .minMax([1,-3,5]) => {min:-3, max:10}

         Update exercise to also handle these cases:
         .minMax([]) => {min:null, max:null}
         .minMax([3]) => {min:3, max:3}
         */
        
       if(arr.length === 0){
        return {min:null, max:null};
       }
         let min = arr[0];
         let max = arr[0];

         for(let i=0; i<arr.length; i++){
            if(arr[i]<min){
                if(min == null){
                    min = null;
                }
                else{
                min = arr[i];
                }
            }
            if(arr[i]>max){
                if(max == null){
                    max = null;
                }
                else{
                max = arr[i];
                }
            }
         }
         console.log('Min: ',min);
         console.log('Max: ',max);
        }

        function countWords(words){
            /*
             Create a function countWords(words) that takes an array of strings
             and returns an object with how may times each string appeared.
             .countWords(['apple','grape','apple','apple']) => {apple:3, grape:1}
             (Hint: you can access a property using a variable: object[variable];
             This uses the value inside the variable as the property name.)
             */

             let result = {};
             for(let i=0; i<words.length; i++){
                let word = words[i];
                if(result[word]){
                    result[word]++;
                }
                else{
                    result[word] = 1;// word is property and 1 is value

                }
             }
             
             return result;
             

        }
