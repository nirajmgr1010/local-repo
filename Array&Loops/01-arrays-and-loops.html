    <script>
        const myArray= [10, 20, 30]; //it is the list of data 
        console.log(myArray);

        console.log(myArray[0]);//it displays 0 index value of array
        myArray[0] = 99; //It changes the value
        console.log(myArray[0]);

        const Array = [1, ' hello', true, {name:'socks'}]; //An array iteself is also value
                    //integer,string,boolean,object are store
       console.log(typeof Array[0]); // it print integer
       console.log(typeof Array[1]); //it print string
       
       //Arrays have properties and methods
       console.log(myArray.length); // it display the length of arr

       myArray.push(100); //it push or add the value at the last index of arr

       myArray.splice(0,1); /*1. Index we want to remove 2.Number of values to remove */
     console.log(myArray); //it removes the first element of the arr  [10,30,100]
   
    let i = 1;
    while(i<=4){
        console.log(i);
        i++;
    }
     console.log("next")
    for(let i=1; i<=5; i++){
        console.log(i);
    }

    /*
    Generate random numbers until one that's at least 0.5
    While vs For Loop
    Standard loop => for
    Non-standard loop => while
    
    */

    console.log("next")
    let randomNumber = 0;
    while(randomNumber < 0.5){
        randomNumber = Math.random();
    }
    console.log(randomNumber);
    console.log("next")

    /*
    Looping Through an Array
    1.Go through each value of an array ony by one
    2.Do something with each value
    */

    const todoList =[
        'make dinner',
        'wash dishes',
        'watch youtube'
    ];

    for(let i = 0; i < todoList.length; i++){
      const value = todoList[i];
        console.log(value);
    }

    /*
    Accumulator pattern
    1. Create a variable to store the result
    2. Loop through the array and update the result
    Problem:
    We have an array of numbers:
    [1,1,3]
    How do we calculate the total?
    */
   console.log("next")
   const nums = [1,1,3];

   let sum = 0;
   for(let i=0; i<nums.length; i++){
    sum += nums[i]; 
   }
   console.log(sum);
    console.log("next")

    const numsDoubled = [];
    for(let i=0; i<nums.length; i++){
        const num = nums[i];
        numsDoubled.push(num * 2);
    }

    console.log(numsDoubled);

   </script>
