<!--
Steps (Algorithm)
1.Create array to store todos
2.When we click "Add",
3.Get text from textbox
4.Add it to array
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

       .css-name,
       .css-date {
        padding: 6px;
        font-size: 15px;
      }
      .add-btn{
        padding: 6px;
        background-color: green;
        color: white;
        font-size: 1rem;
        font-family: Arial, Helvetica, sans-serif;
        border: none;
        cursor: pointer;
      }
      .add-btn:hover{
       background-color: white;
       border: 1px solid black;
       color: black;
      } 
      .delete-todo-btn{
        padding: 6px;
        background-color: darkred;
        color: white;
        font-size: 1rem;
        font-family: Arial, Helvetica, sans-serif;
        border: none;
        cursor: pointer;
      }

      /**/
      .todo-grid,
       .todo-input-grid{
        display: grid;
        grid-template-columns: 200px 150px 100px;
        column-gap: 10px;
        row-gap: 10px;
        align-items: center;
      }
      .todo-input-grid{
        margin-bottom: 10px;
        align-items: stretch;
      }
    </style>
</head>
<body>
    <p>Todo List Practice 1</p>
    <div class="todo-input-grid">
    <input type="text" placeholder="Todo name" class="js-name-input css-name">
    <input type="date" class="js-date-input css-date">
    <button onclick="addTodo()" class="add-btn">Add</button>       
    </div>
    <div class="js-todo-list todo-grid">
         
    </div>
    <script src="01-todo-list.js"></script>
</body>
</html>
