     /*
     More details about loops
     1.break = exit a loop early
     2.continue =  skip 1 iteration
     */
     for(let i =1; i<= 10; i++){
        //for example of continue skip a number if it's divisible by 3
        if(i % 3 === 0){
            continue;
        }
        console.log(i); //it will print 1 2 4 5 6 7 8

        if(i==8){
            break;
        }
     }

     //count from 1 to 10 using a while loop
     let i =1;
     while(i<=10){
        if(i % 3 === 0){
            i++;
            continue;
        }
        console.log(i);
        i++;
     }

          //how to use loop with function
     function doubleArray(nums) {
       const numsDoubled = [];
    for(let i=0; i<nums.length; i++){
        const num = nums[i];
        if(num === 0){
            return numsDoubled;
        }
        numsDoubled.push(num * 2);
    }
    console.log(numsDoubled);
}
   doubleArray([1,1,3]);
