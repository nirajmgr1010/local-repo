    /*
    Create a funciton addNum(array,num) that takes an array of numbers
    and returns an array where each number is increased by 'num'.
    .addNum([1,2,3],2) => [3,4,5]
    .addNum([1,2,3],3) => [4,5,6]
    */
   function getNum(){
    const arr = [1,2,3,4,5,6];
     const getElement = document.querySelector('.js-num');
     let num = parseInt(getElement.value);

     addNum(arr,num);
     getElement.value = '';
   }
   function addNum(arr, num){
    const newarr = [];
     for(let i =0; i<arr.length; i++){
        newarr.push(arr[i]+num);
     }
     console.log(newarr);
   }
